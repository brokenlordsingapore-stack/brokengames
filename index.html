<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrokenGames</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
  body{background:#111;color:#eee}
  a{color:inherit;text-decoration:none}
  
  /* Header */
  header{background:#1a1a1a;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  
  .logo-wrap{display:flex;align-items:center;cursor:pointer}
  .logo-img{width:160px;height:auto;object-fit:contain}
  
  .search-box{display:flex;gap:8px;position:relative;z-index:2}
  .search-box input{
    padding:8px 12px;
    border:none;
    border-radius:4px;
    width:250px;
    background:rgba(42,42,42,0.85);
    color:#eee;
    backdrop-filter:blur(4px);
  }
  .search-box input:focus{outline:2px solid #4caf50;background:rgba(42,42,42,0.95)}
  
  /* Hero Banner with Video */
  .hero{
    position:relative;
    width:100%;
    height:200px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .hero video{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .hero-overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
  }
  
  /* Homepage Grid */
  .container{max-width:1200px;margin:20px auto;padding:0 15px}
  .section-title{font-size:24px;margin:20px 0 15px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .card{background:#1e1e1e;border-radius:6px;overflow:hidden;transition:0.2s;cursor:pointer}
  .card:hover{transform:scale(1.03);background:#262626}
  .card img{width:100%;height:140px;object-fit:cover;display:block}
  .card-title{padding:6px;font-size:11px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  
  /* Game Detail Page */
  .detail{display:none;max-width:900px;margin:30px auto;padding:0 15px}
  .detail.active{display:block}
  .detail-header{margin-bottom:20px}
  .detail-header h1{font-size:28px;margin-bottom:5px;color:#4caf50}
  .meta{color:#aaa;font-size:13px}
  .detail-content{display:flex;gap:20px;flex-wrap:wrap}
  .detail-img{flex:0 0 300px}
  .detail-img img{width:100%;border-radius:6px}
  .detail-info{flex:1;min-width:250px}
  .info-row{margin-bottom:12px}
  .info-label{font-weight:bold;color:#4caf50;margin-bottom:4px}
  .info-value{color:#ddd;line-height:1.5}
  .price{font-size:26px;color:#ff9800;font-weight:bold;margin-top:15px}
  .back-btn{display:inline-block;margin-bottom:15px;padding:8px 15px;background:#4caf50;border-radius:4px;cursor:pointer}
  .back-btn:hover{background:#45a049}
  
  @media(max-width:768px){
    .search-box input{width:150px}
    .detail-content{flex-direction:column}
    .detail-img{flex:0 0 auto}
    .logo-img{width:120px}
    .hero{height:150px}
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap" onclick="showHome()">
    <img src="logo.png" alt="BrokenGames" class="logo-img">
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search games...">
  </div>
</header>

<!-- Hero Banner with 3s Gameplay Video -->
<div class="hero">
  <video autoplay muted loop playsinline controls>
    <source src="gameplay.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <div class="hero-overlay"></div>
</div>

<!-- Homepage -->
<div id="home" class="container">
  <h2 class="section-title">Popular Games</h2>
  <div class="grid" id="gameGrid"></div>
</div>

<!-- Game Detail Page -->
<div id="detail" class="detail">
  <div class="back-btn" onclick="showHome()">← Back</div>
  <div class="detail-header">
    <h1 id="detailTitle"></h1>
    <div class="meta" id="detailMeta"></div>
  </div>
  <div class="detail-content">
    <div class="detail-img">
      <img id="detailImg" src="" alt="">
      <div class="price" id="detailPrice"></div>
    </div>
    <div class="detail-info">
      <div class="info-row">
        <div class="info-label">Genre/Tags:</div>
        <div class="info-value" id="detailGenre"></div>
      </div>
      <div class="info-row">
        <div class="info-label">Type:</div>
        <div class="info-value" id="detailType"></div>
      </div>
      <div class="info-row">
        <div class="info-label">Size:</div>
        <div class="info-value" id="detailSize"></div>
      </div>
      <div class="info-row">
        <div class="info-label">Minimum Requirements:</div>
        <div class="info-value" id="detailReq"></div>
      </div>
    </div>
  </div>
</div>

<script>
const games = [
  {
    id: 1,
    title: "Echoes of the End v1.0",
    img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLvmp2IhiObRXcR391gVC0-EyNLMZrNpPZJ4wUVjtPPGq4OQqB4uC8BI2FH1M-0ir2zL4cQg&s=10",
    genre: "Action, Adventure, RPG",
    type: "Single Player",
    size: "45 GB",
    req: "CPU: i3-12100 | GPU: GTX 1080 | RAM: 8GB",
    price: "N10,000",
    date: "12/08/2025"
  },
  {
    id: 2,
    title: "Ghost of Tsushima Director's Cut",
    img: "https://static0.srcdn.com/wordpress/wp-content/uploads/2020/07/Ghost-of-Tsushima-Key-Art.jpg?q=50&fit=crop&w=1008&h=693&dpr=1.5",
    genre: "Action, Open World, Samurai",
    type: "Single Player",
    size: "80 GB",
    req: "CPU: i5-11400 | GPU: RTX 3070 | RAM: 16GB",
    price: "N10,000",
    date: "05/03/2025"
  },
  {
    id: 3,
    title: "The Last of Us Part II Remastered",
    img: "https://i6.imageban.ru/out/2025/04/04/9bf82590f5ac879c804306b43bb9433f.jpg",
    genre: "Action, Adventure, Survival",
    type: "Single Player",
    size: "150 GB",
    req: "CPU: i5-8600 | GPU: RTX 3060 | RAM: 16GB",
    price: "N10,000",
    date: "19/01/2025"
  },
{
    id: 4,
    title: "Beach Buggy Racing 2 Island Adventure",
    img: "https://i.pinimg.com/1200x/a3/bc/8d/a3bc8d9ce0f6c10554bc7ccb7d4e6070.jpg",
    genre: "Racing",
    type: "Multi Player",
    size: "420 MB",
    req: "CPU: 1 GHz | GPU: DirectX 10  | RAM: 1GB",
    price: "N2000",
    date: "3/10/2021"
  },
];

function renderGrid(filter=""){
  const grid = document.getElementById('gameGrid');
  grid.innerHTML = '';
  const filtered = games.filter(g => g.title.toLowerCase().includes(filter.toLowerCase()));
  
  if(filtered.length === 0){
    grid.innerHTML = '<p>No games found.</p>';
    return;
  }
  
  filtered.forEach(game => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => showDetail(game.id);
    card.innerHTML = `
      <img src="${game.img}" alt="${game.title}">
      <div class="card-title">${game.title}</div>
    `;
    grid.appendChild(card);
  });
}

function showDetail(id){
  const game = games.find(g => g.id === id);
  if(!game) return;
  
  document.getElementById('home').style.display = 'none';
  document.getElementById('detail').classList.add('active');
  
  document.getElementById('detailTitle').textContent = game.title;
  document.getElementById('detailMeta').textContent = `${game.date} | BrokenGames`;
  document.getElementById('detailImg').src = game.img;
  document.getElementById('detailGenre').textContent = game.genre;
  document.getElementById('detailType').textContent = game.type;
  document.getElementById('detailSize').textContent = game.size;
  document.getElementById('detailReq').textContent = game.req;
  document.getElementById('detailPrice').textContent = game.price;
  
  window.scrollTo(0,0);
}

function showHome(){
  document.getElementById('home').style.display = 'block';
  document.getElementById('detail').classList.remove('active');
  document.getElementById('searchInput').value = '';
  renderGrid();
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  renderGrid(e.target.value);
});

// Initial load
renderGrid();
</script>

</body>
</html>
